services:
  postgres:
    image: postgres:16-alpine
    container_name: acp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: acp
      POSTGRES_DB: acp
    ports:
      - "5432:5432"
    volumes:
      - acp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acp -d acp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  acp_pgdata:
